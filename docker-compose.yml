version: "3.9"

services:
  db:
    image: mariadb:10.6
    container_name: hiz_db
    environment:
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: zabbix_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  zabbix-server:
    image: zabbix/zabbix-server-mysql:alpine-7.2-latest
    container_name: hiz_zabbix_server
    depends_on:
      - db
    environment:
      DB_SERVER_HOST: db
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: zabbix_pass
    ports:
      - "10051:10051"
    restart: unless-stopped

  zabbix-web:
    image: zabbix/zabbix-web-nginx-mysql:alpine-7.2-latest
    container_name: hiz_zabbix_web
    depends_on:
      - zabbix-server
      - db
    environment:
      DB_SERVER_HOST: db
      MYSQL_DATABASE: zabbix
      MYSQL_USER: zabbix
      MYSQL_PASSWORD: zabbix_pass
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: "Asia/Kolkata"
    ports:
      - "8080:8080"
    restart: unless-stopped

  zabbix-agent:
    image: zabbix/zabbix-agent:alpine-7.2-latest
    container_name: hiz_zabbix_agent
    environment:
      ZBX_SERVER_HOST: zabbix-server
      HOST_NAME: zabbix-agent
    restart: unless-stopped

  snmp-exporter:
    image: prom/snmp-exporter:latest
    container_name: hiz_snmp_exporter
    volumes:
      - ./prometheus/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    ports:
      - "9116:9116"
    restart: unless-stopped

  netconf-poller:
    build:
      context: ./netconf-poller
      dockerfile: Dockerfile
    container_name: hiz_netconf_poller
    depends_on:
      - zabbix-server
    volumes:
      - ./netconf-poller/config.yml:/app/config.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: hiz_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: alexanderzobnin-zabbix-app
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

  patient-simulator:
    build:
      context: ./patient-simulator
      dockerfile: Dockerfile
    container_name: patient_simulator
    depends_on:
      - zabbix-server
      - zabbix-web
    restart: unless-stopped

volumes:
  db_data:
  grafana_data: